<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e0f7fa; /* Color de fondo suave */
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #ffffff; /* Fondo blanco para el formulario */
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="email"], input[type="tel"], input[type="number"], textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        input[type="radio"], input[type="checkbox"] {
            margin-right: 10px;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="acercade.html">Acerca de</a></li>
            <li><a href="contacto.html">contacto</a></li>
        </ul>
    </nav>

<div class="container">
    <h2>Formulario de Registro</h2>
    <form id="registrationForm">
        <div class="form-group">
            <label for="nombre">Nombre (max 20 caracteres):</label>
            <input type="text" id="nombre" name="nombre" maxlength="20" required>
        </div>
        <div class="form-group">
            <label for="apellido">Apellido (max 20 caracteres):</label>
            <input type="text" id="apellido" name="apellido" maxlength="20">
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej: 1234567890">
        </div>
        <div class="form-group">
            <label for="edad">Edad (16-120 años):</label>
            <input type="number" id="edad" name="edad" min="16" max="120" required>
        </div>
        <div class="form-group">
            <label for="direccion">Dirección:</label>
            <textarea id="direccion" name="direccion"></textarea>
        </div>
        <div class="form-group">
            <label for="provincia">Provincia:</label>
            <input type="text" id="provincia" name="provincia" list="provincias">
            <datalist id="provincias">
                <option value="Chubut">
                <option value="Neuquén">
                <option value="Río Negro">
                <option value="Santa Cruz">
                <option value="Tierra del Fuego">
                <option value="La Pampa">
                <option value="Mendoza">
            </datalist>
        </div>
        <div class="form-group">
            <label for="codigoPostal">Código Postal (A1234ABC):</label>
            <input type="text" id="codigoPostal" name="codigoPostal" pattern="^[A][0-9]{4}[A-Z]{3}$" required>
        </div>
        <div class="form-group">
            <label>Método preferido de contacto:</label>
            <div>
                <label><input type="radio" name="metodoContacto" value="correo electrónico" checked> Correo electrónico</label>
                <label><input type="radio" name="metodoContacto" value="correo postal"> Correo postal</label>
                <label><input type="radio" name="metodoContacto" value="teléfono"> Teléfono</label>
            </div>
        </div>
        <div class="form-group">
            <label>Tipo de suscripción:</label>
            <div>
                <label><input type="checkbox" name="suscripcion" value="noticias"> Noticias</label>
                <label><input type="checkbox" name="suscripcion" value="promociones"> Promociones</label>
                <label><input type="checkbox" name="suscripcion" value="alertas" checked> Alertas</label>
                <label><input type="checkbox" name="suscripcion" value="eventos"> Eventos</label>
            </div>
        </div>
        <button type="button" onclick="submitForm()">Cargar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Campo</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody id="resultTable">
            <tr><td>Nombre</td><td></td></tr>
            <tr><td>Apellido</td><td></td></tr>
            <tr><td>Email</td><td></td></tr>
            <tr><td>Teléfono</td><td></td></tr>
            <tr><td>Edad</td><td></td></tr>
        </tbody>
    </table>
</div>

<script>
    function submitForm() {
        const form = document.getElementById('registrationForm');
        const table = document.getElementById('resultTable');
        
        // Rellenar los valores en la tabla
        table.rows[0].cells[1].innerText = form.nombre.value;
        table.rows[1].cells[1].innerText = form.apellido.value;
        table.rows[2].cells[1].innerText = form.email.value;
        table.rows[3].cells[1].innerText = form.telefono.value;
        table.rows[4].cells[1].innerText = form.edad.value;
    }
</script>

</body>
</html>
